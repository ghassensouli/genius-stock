<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Genius Stock">
<meta name="theme-color" content="#070d1c">
<title>Genius Stock — Accès Mobile</title>
<style>
  :root {
    --bg: #070d1c; --surf: #0d1b35; --card: #111f3e;
    --bd: #1e3560; --tx: #cce0ff; --mu: #5a84b8;
    --ac: #3b82f6; --gr: #10b981; --rd: #ef4444;
    --am: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--tx); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

  /* LOGIN SCREEN */
  #loginScreen {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
  }
  .login-logo { font-size:56px; margin-bottom:8px; }
  .login-title { font-size:28px; font-weight:800; color:#fff; margin-bottom:4px; }
  .login-sub { font-size:14px; color:var(--mu); margin-bottom:36px; text-align:center; }
  .login-card {
    background:var(--card); border:1px solid var(--bd);
    border-radius:20px; padding:28px 24px; width:100%; max-width:380px;
  }
  .login-label { font-size:12px; font-weight:700; color:var(--mu); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
  .login-input {
    width:100%; background:var(--surf); border:1px solid var(--bd);
    border-radius:12px; padding:14px 16px; font-size:20px; font-weight:700;
    color:#fff; text-align:center; letter-spacing:4px; text-transform:uppercase;
    margin-bottom:16px; font-family:monospace;
  }
  .login-input:focus { outline:none; border-color:var(--ac); }
  .login-input::placeholder { color:var(--mu); font-size:16px; letter-spacing:2px; font-weight:400; }
  .login-btn {
    width:100%; background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:#fff; border:none; border-radius:12px; padding:15px;
    font-size:16px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 20px rgba(59,130,246,0.4);
  }
  .login-err { color:var(--rd); font-size:13px; text-align:center; margin-top:12px; display:none; }
  .login-hint { font-size:12px; color:var(--mu); text-align:center; margin-top:16px; line-height:1.6; }

  /* MAIN APP */
  #app { display:none; }

  /* Header */
  .header {
    background:var(--surf); border-bottom:1px solid var(--bd);
    padding:14px 16px; position:sticky; top:0; z-index:100;
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .header-logo { display:flex; align-items:center; gap:8px; }
  .header-logo-icon { font-size:20px; }
  .header-logo-name { font-size:18px; font-weight:800; color:#fff; }
  .shop-name { font-size:13px; color:var(--mu); }
  .sync-time { font-size:11px; color:var(--mu); }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--gr); display:inline-block; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Search */
  .search-bar {
    background:var(--bg); border:1px solid var(--bd); border-radius:10px;
    padding:10px 14px; font-size:14px; color:var(--tx); width:100%;
  }
  .search-bar:focus { outline:none; border-color:var(--ac); }

  /* Category pills */
  .cats {
    display:flex; gap:8px; padding:12px 16px; overflow-x:auto;
    border-bottom:1px solid var(--bd);
    scrollbar-width:none;
  }
  .cats::-webkit-scrollbar { display:none; }
  .cat-pill {
    flex-shrink:0; padding:7px 16px; border-radius:100px;
    font-size:13px; font-weight:600; cursor:pointer; border:none;
    background:var(--card); color:var(--mu); border:1px solid var(--bd);
  }
  .cat-pill.active { background:var(--ac); color:#fff; border-color:var(--ac); }

  /* Stats bar */
  .stats-bar {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:8px; padding:12px 16px;
    border-bottom:1px solid var(--bd);
    background:var(--surf);
  }
  .stat { text-align:center; }
  .stat-val { font-size:18px; font-weight:800; color:var(--ac); }
  .stat-val.green { color:var(--gr); }
  .stat-val.red { color:var(--rd); }
  .stat-label { font-size:10px; color:var(--mu); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

  /* Filter bar */
  .filter-bar {
    display:flex; gap:8px; padding:10px 16px; align-items:center;
    border-bottom:1px solid var(--bd);
  }
  .filter-label { font-size:12px; color:var(--mu); }
  .filter-btn {
    padding:5px 12px; border-radius:100px; font-size:12px;
    font-weight:600; border:1px solid var(--bd); background:transparent;
    color:var(--mu); cursor:pointer;
  }
  .filter-btn.active { background:var(--ac); color:#fff; border-color:var(--ac); }
  .filter-btn.alert { background:#ef444420; color:var(--rd); border-color:var(--rd); }
  .filter-btn.alert.active { background:var(--rd); color:#fff; }

  /* Product list */
  .products { padding:12px 16px; display:flex; flex-direction:column; gap:10px; }

  .prod-card {
    background:var(--card); border:1px solid var(--bd);
    border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
  }
  .prod-card.low-stock { border-color:rgba(245,158,11,0.4); background:rgba(245,158,11,0.05); }
  .prod-card.out-stock { border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.05); }

  .prod-icon {
    width:44px; height:44px; border-radius:10px;
    background:var(--surf); display:flex; align-items:center;
    justify-content:center; font-size:20px; flex-shrink:0;
  }

  .prod-body { flex:1; min-width:0; }
  .prod-name { font-size:15px; font-weight:700; color:#fff; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prod-ref { font-size:11px; color:var(--mu); }
  .prod-cat { font-size:11px; color:var(--ac); font-weight:600; }

  .prod-right { text-align:right; flex-shrink:0; }
  .prod-qty { font-size:22px; font-weight:900; }
  .prod-qty.ok { color:var(--gr); }
  .prod-qty.low { color:var(--am); }
  .prod-qty.out { color:var(--rd); }
  .prod-unit { font-size:11px; color:var(--mu); }
  .prod-price { font-size:13px; font-weight:700; color:var(--ac); margin-top:2px; }

  .alert-badge {
    display:inline-block; background:rgba(245,158,11,0.2);
    color:var(--am); font-size:10px; font-weight:700;
    padding:2px 8px; border-radius:100px; margin-top:4px;
  }

  /* Empty state */
  .empty { text-align:center; padding:60px 20px; color:var(--mu); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-text { font-size:16px; font-weight:600; }

  /* Loading */
  #loading {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; gap:16px;
  }
  .spinner { width:40px; height:40px; border:3px solid var(--bd); border-top-color:var(--ac); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:14px; color:var(--mu); }

  /* Logout btn */
  .logout-btn {
    background:transparent; border:1px solid var(--bd);
    color:var(--mu); border-radius:8px; padding:6px 12px;
    font-size:12px; cursor:pointer;
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading" style="display:none">
  <div style="font-size:40px">🧠</div>
  <div class="spinner"></div>
  <div class="loading-text">Chargement du stock...</div>
</div>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-logo">🧠</div>
  <div class="login-title">Genius Stock</div>
  <div class="login-sub">Consultez votre stock en temps réel</div>
  <div class="login-card">
    <div class="login-label">Votre Code Mobile (Code 2)</div>
    <input type="text" id="codeInput" class="login-input" 
           placeholder="XXXXX-XXXXX" 
           maxlength="11"
           autocomplete="off"
           spellcheck="false">
    <button class="login-btn" onclick="login()">Accéder à mon stock →</button>
    <div id="loginErr" class="login-err">❌ Code invalide — vérifiez votre code</div>
    <div class="login-hint">
      Retrouvez votre Code Mobile dans<br>
      <strong>Genius PC → Paramètres → 📱 Accès Mobile</strong>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="header-logo">
        <div class="header-logo-icon">🧠</div>
        <div>
          <div class="header-logo-name">Genius Stock</div>
          <div class="shop-name" id="shopName">—</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-dot"></span>
        <span class="sync-time" id="syncTime">—</span>
        <button class="logout-btn" onclick="logout()">✕</button>
      </div>
    </div>
    <input type="text" class="search-bar" id="searchInput" 
           placeholder="🔍 Rechercher un produit..."
           oninput="filterProducts()">
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">Produits</div>
    </div>
    <div class="stat">
      <div class="stat-val red" id="statAlerts">0</div>
      <div class="stat-label">⚠️ Alertes</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="statValue">0</div>
      <div class="stat-label">Valeur DT</div>
    </div>
  </div>

  <div class="cats" id="catsBar"></div>

  <div class="filter-bar">
    <span class="filter-label">Filtre :</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn alert" onclick="setFilter('low',this)">⚠️ Stock faible</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">✅ OK</button>
  </div>

  <div class="products" id="productsList"></div>
</div>

<script>
const FIREBASE_URL='https://playtech-750f9-default-rtdb.europe-west1.firebasedatabase.app';
const MOBILE_SECRET='PLAYTECHmobile2024GENIUS';
const SAVED_CODE_KEY='genius_mobile_code';

let allProducts=[];
let currentCat='all';
let currentFilter='all';
let searchVal='';
let refreshInterval=null;

// Generate mobile code from machine ID (same logic as Genius PC)
function generateNodeId(code){
  return code.replace(/-/g,'').toUpperCase();
}

// Validate code format XXXXX-XXXXX
function isValidFormat(code){
  return /^[A-Z0-9]{5}-[A-Z0-9]{5}$/i.test(code.trim());
}

// Auto-format input
document.getElementById('codeInput').addEventListener('input',function(){
  let val=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'');
  if(val.length>5&&val[5]!=='-'){val=val.slice(0,5)+'-'+val.slice(5);}
  if(val.length>11) val=val.slice(0,11);
  this.value=val;
});

document.getElementById('codeInput').addEventListener('keydown',function(e){
  if(e.key==='Enter') login();
});

async function login(){
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(!isValidFormat(code)){
    showErr(true);
    return;
  }
  showErr(false);
  document.getElementById('loading').style.display='flex';
  document.getElementById('loginScreen').style.display='none';
  
  try{
    const nodeId=generateNodeId(code);
    const res=await fetch(`${FIREBASE_URL}/stocks/${nodeId}.json`);
    const data=await res.json();
    if(!data||!data.products){
      document.getElementById('loading').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
      showErr(true);
      return;
    }
    // Save code
    localStorage.setItem(SAVED_CODE_KEY,code);
    loadApp(data,code);
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    showErr(true);
  }
}

function loadApp(data,code){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  
  allProducts=data.products||[];
  document.getElementById('shopName').textContent=data.shopName||'Mon Commerce';
  
  const sync=data.lastSync?new Date(data.lastSync).toLocaleString('fr-TN',{
    day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'
  }):'—';
  document.getElementById('syncTime').textContent=sync;
  
  buildCats();
  renderProducts();
  updateStats();
  
  // Auto-refresh every 30 seconds
  if(refreshInterval) clearInterval(refreshInterval);
  refreshInterval=setInterval(()=>refreshData(code),30000);
}

async function refreshData(code){
  try{
    const nodeId=generateNodeId(code);
    const res=await fetch(`${FIREBASE_URL}/stocks/${nodeId}.json`);
    const data=await res.json();
    if(data&&data.products){
      allProducts=data.products;
      const sync=data.lastSync?new Date(data.lastSync).toLocaleString('fr-TN',{
        day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'
      }):'—';
      document.getElementById('syncTime').textContent=sync;
      renderProducts();
      updateStats();
    }
  }catch(e){}
}

function buildCats(){
  const cats=[...new Set(allProducts.map(p=>p.category||'Autres'))].sort();
  const bar=document.getElementById('catsBar');
  bar.innerHTML=`<button class="cat-pill active" onclick="setCat('all',this)">Tous (${allProducts.length})</button>`+
    cats.map(cat=>{
      const count=allProducts.filter(p=>(p.category||'Autres')===cat).length;
      return`<button class="cat-pill" onclick="setCat('${cat}',this)">${cat} (${count})</button>`;
    }).join('');
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function filterProducts(){
  searchVal=document.getElementById('searchInput').value.toLowerCase();
  renderProducts();
}

function renderProducts(){
  let prods=[...allProducts];
  
  // Category filter
  if(currentCat!=='all') prods=prods.filter(p=>(p.category||'Autres')===currentCat);
  
  // Stock filter
  if(currentFilter==='low') prods=prods.filter(p=>(p.qty||0)<=(p.minQty||5));
  if(currentFilter==='ok') prods=prods.filter(p=>(p.qty||0)>(p.minQty||5));
  
  // Search
  if(searchVal) prods=prods.filter(p=>
    p.name.toLowerCase().includes(searchVal)||
    (p.ref||'').toLowerCase().includes(searchVal)||
    (p.category||'').toLowerCase().includes(searchVal)
  );
  
  // Sort: out of stock first, then low, then OK
  prods.sort((a,b)=>{
    const sa=a.qty||0; const sb=b.qty||0;
    const ma=a.minQty||5; const mb=b.minQty||5;
    const ra=sa<=0?0:sa<=ma?1:2;
    const rb=sb<=0?0:sb<=mb?1:2;
    if(ra!==rb) return ra-rb;
    return a.name.localeCompare(b.name);
  });
  
  const list=document.getElementById('productsList');
  
  if(!prods.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Aucun produit</div></div>`;
    return;
  }
  
  const icons={'Électronique':'💻','Informatique':'🖥️','Téléphonie':'📱',
    'Accessoires':'🎧','Vêtements':'👕','Alimentation':'🍎','Autres':'📦'};
  
  list.innerHTML=prods.map(p=>{
    const qty=p.qty||0;
    const min=p.minQty||5;
    const isOut=qty<=0;
    const isLow=!isOut&&qty<=min;
    const qtyClass=isOut?'out':isLow?'low':'ok';
    const cardClass=isOut?'out-stock':isLow?'low-stock':'';
    const icon=icons[p.category]||'📦';
    
    return`<div class="prod-card ${cardClass}">
      <div class="prod-icon">${icon}</div>
      <div class="prod-body">
        <div class="prod-name">${esc(p.name)}</div>
        ${p.ref?`<div class="prod-ref">Réf: ${esc(p.ref)}</div>`:''}
        <div class="prod-cat">${esc(p.category||'Autres')}</div>
        ${isLow&&!isOut?`<span class="alert-badge">⚠️ Stock faible</span>`:''}
        ${isOut?`<span class="alert-badge" style="background:rgba(239,68,68,0.2);color:var(--rd)">❌ Rupture</span>`:''}
      </div>
      <div class="prod-right">
        <div class="prod-qty ${qtyClass}">${qty}</div>
        <div class="prod-unit">${p.unit||'pcs'}</div>
        ${p.price?`<div class="prod-price">${p.price.toFixed(3)} DT</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  const total=allProducts.length;
  const alerts=allProducts.filter(p=>(p.qty||0)<=(p.minQty||5)).length;
  const value=allProducts.reduce((t,p)=>t+(p.qty||0)*(p.prixAchat||p.price||0),0);
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statAlerts').textContent=alerts;
  document.getElementById('statValue').textContent=value>1000?(value/1000).toFixed(1)+'K':value.toFixed(0);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showErr(show){
  document.getElementById('loginErr').style.display=show?'block':'none';
}

function logout(){
  if(refreshInterval) clearInterval(refreshInterval);
  localStorage.removeItem(SAVED_CODE_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('codeInput').value='';
  currentCat='all'; currentFilter='all'; searchVal='';
}

// Auto-login if code saved
window.addEventListener('load',()=>{
  const saved=localStorage.getItem(SAVED_CODE_KEY);
  if(saved){
    document.getElementById('codeInput').value=saved;
    login();
  }
});
</script>
</body>
</html>
